apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: node1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: node1
  template:
    metadata:
      labels:
        app: node1

    spec:
      hostAliases:
      - ip: "1.1.1.1"
        hostnames:
         - "testserver"
      containers:
      - name: node1
        image: ilayarajanabi/nginx:latest
        command: [ "/bin/bash", "-ce", "tail -f /dev/null" ]
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
      imagePullSecrets:
      - name: $KUBER_CONFIG

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: node1
spec:
  type: NodePort
  sessionAffinity: None
  selector:
     app: node1
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30100
