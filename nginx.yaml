---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: node1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: node1
  template:
    metadata:
      labels:
        app: node1

    spec:
      hostAliases:
      - ip: "1.1.1.1"
        hostnames:
         - "testserver"
      containers:
      - name: node1
        image: ilayarajanabi/nginx:1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: node1
spec:
  type: NodePort
  sessionAffinity: None
  selector:
     app: node1
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30100
